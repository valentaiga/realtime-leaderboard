syntax = "proto3";
package BackOffice.Chronicle.Grpc;
import "google/protobuf/timestamp.proto";

enum FilterOperator {
   Equals = 0;
   NotEquals = 1;
   GreaterThan = 2;
   GreaterThanOrEqual = 3;
   LessThan = 4;
   LessThanOrEqual = 5;
   Contains = 6;
   NotContains = 7;
   In = 8;
   NotIn = 9;
   Between = 10;
   StartsWith = 11;
   EndsWith = 12;
}
message FilterResult_GrpcMatchInfo {
   repeated GrpcMatchInfo Data = 1;
   int64 Total = 2;
}
message GetPlayerMatchesFilter {
   GrpcFilterDescriptor_Int64 PlayerId = 1;
   GrpcFilterDescriptor_DateTime StartedAt = 2;
   GrpcFilterDescriptor_DateTime FinishedAt = 3;
   GrpcFilterDescriptor_Boolean PlayerWon = 4;
   int64 Limit = 5;
   int64 Offset = 6;
}
message GrpcFilterDescriptor_Boolean {
   bool Value = 1;
   FilterOperator Operator = 2;
}
message GrpcFilterDescriptor_DateTime {
   .google.protobuf.Timestamp Value = 1;
   FilterOperator Operator = 2;
}
message GrpcFilterDescriptor_Int64 {
   int64 Value = 1;
   FilterOperator Operator = 2;
}
message GrpcMatchInfo {
   string MatchId = 1; // default value could not be applied: 00000000-0000-0000-0000-000000000000
   repeated GrpcMatchPlayer Players = 2;
   .google.protobuf.Timestamp StartedAt = 3;
   .google.protobuf.Timestamp FinishedAt = 4;
}
message GrpcMatchPlayer {
   int64 PlayerId = 1;
   bool IsWin = 2;
}
service ChronicleApi {
   rpc GetPlayerMatches (GetPlayerMatchesFilter) returns (FilterResult_GrpcMatchInfo);
}
