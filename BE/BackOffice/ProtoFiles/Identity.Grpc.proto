syntax = "proto3";
package BackOffice.Identity.Grpc;
import "google/protobuf/empty.proto";

message GrpcChallengeUserRequest {
   string Username = 1;
   string Password = 2;
}
message GrpcChallengeUserResponse {
   GrpcUserInfo User = 1;
}
message GrpcGetUserByIdRequest {
   int64 UserId = 1;
}
message GrpcGetUserByIdResponse {
   GrpcUserInfo User = 1;
}
message GrpcRegisterUserRequest {
   int64 Id = 1;
   string Username = 2;
   string Password = 3;
}
message GrpcUserInfo {
   int64 UserId = 1;
   string UserName = 2;
}
service IdentityApi {
   rpc ChallengeUser (GrpcChallengeUserRequest) returns (GrpcChallengeUserResponse);
   rpc GetUserById (GrpcGetUserByIdRequest) returns (GrpcGetUserByIdResponse);
   rpc RegisterUser (GrpcRegisterUserRequest) returns (.google.protobuf.Empty);
}
